<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Objetivos — CID · Vinatea & Toyama</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a18; min-height: 100vh; padding: 24px 16px; }
  :root {
    --bg: #ffffff; --bg2: #f3f3f0; --border: rgba(0,0,0,0.1);
    --text: #1a1a18; --text2: #6b6b68; --text3: #9e9e9b;
    --radius: 10px; --radius-lg: 14px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  .header-left .meta { font-size: 11px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }
  .header-left .title { font-size: 20px; font-weight: 600; color: var(--text); }
  .btn-export { display: flex; align-items: center; gap: 6px; background: #0F6E56; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-export:hover { opacity: .88; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .stat-num { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .team-bar-wrap { margin-bottom: 22px; }
  .team-bar { display: flex; gap: 3px; height: 8px; border-radius: 8px; overflow: hidden; background: var(--bg2); }
  .team-bar-seg { flex: 1; cursor: pointer; transition: opacity .2s; border-radius: 0; }
  .team-bar-seg:first-child { border-radius: 8px 0 0 8px; }
  .team-bar-seg:last-child { border-radius: 0 8px 8px 0; }
  .team-bar-labels { display: flex; margin-top: 4px; }
  .team-bar-labels span { flex: 1; text-align: center; font-size: 10px; color: var(--text3); }
  .layout { display: grid; grid-template-columns: 230px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }
  .sidebar-label { font-size: 11px; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-card { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; cursor: pointer; transition: all .18s; }
  .member-card.active { border-width: 2px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; border-width: 1.5px; border-style: solid; }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .ring-wrap { position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .ring-label { position: absolute; font-size: 8px; font-weight: 600; }
  .detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .detail-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; border-width: 2px; border-style: solid; }
  .detail-name { font-size: 16px; font-weight: 600; }
  .detail-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .obj-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 12px; }
  .obj-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 13px; }
  .obj-num { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .obj-text { flex: 1; font-size: 13px; line-height: 1.5; }
  .obj-meta-tag { display: inline-block; margin-top: 4px; font-size: 10px; border-radius: 10px; padding: 1px 8px; font-weight: 500; }
  .obj-weight { text-align: right; flex-shrink: 0; }
  .obj-weight .wlbl { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .obj-weight .wnum { font-size: 16px; font-weight: 600; }
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .status-btn { border-width: 1.5px; border-style: solid; border-radius: 20px; padding: 3px 13px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .hint { font-size: 11px; color: var(--text3); }
  .progress-label-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .progress-label-row span { font-size: 11px; }
  .progress-label-row .val { font-weight: 500; }
  input[type=range] { width: 100%; display: block; margin-bottom: 12px; height: 20px; }
  .progress-bar { height: 6px; border-radius: 6px; background: var(--bg2); overflow: hidden; margin-bottom: 13px; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .35s ease; }
  textarea { width: 100%; font-family: inherit; font-size: 12px; color: var(--text2); background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; resize: vertical; }
  textarea::placeholder { color: var(--text3); }
  .detail-footer { font-size: 11px; color: var(--text3); text-align: right; margin-top: 6px; }
  .saved-indicator { font-size: 11px; margin-right: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="meta">Vinatea &amp; Toyama · CID</div>
      <div class="title">Seguimiento de objetivos</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="saved-indicator" id="savedIndicator" style="color:#0F6E56">✓ Guardado</span>
      <button class="btn-export" onclick="exportExcel()">↓ Exportar Excel</button>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="team-bar-wrap">
    <div class="team-bar" id="teamBar"></div>
    <div class="team-bar-labels" id="teamBarLabels"></div>
  </div>

  <div class="layout">
    <div>
      <div class="sidebar-label">Equipo</div>
      <div class="member-list" id="memberList"></div>
    </div>
    <div id="detailPanel"></div>
  </div>
</div>

<script>
const MEMBERS = [
  { name:"Alessandra Hernández", initials:"AH", color:"#185FA5", bg:"#E6F1FB",
    objectives:[
      {text:"Integrar registro de demandas y/o nuevos procesos con Harvey al 100% – IJE.", weight:40},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:40, meta:"Meta: 100%"},
      {text:"Ejecutar 2 propuestas de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
  { name:"Brando Castro", initials:"BC", color:"#0F6E56", bg:"#E1F5EE",
    objectives:[
      {text:"Ejecutar el registro del 100% de demandas y/o nuevos procesos con Harvey con información necesaria para gestión procesal.", weight:30},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:50, meta:"Meta: 100%"},
      {text:"Ejecutar 1 propuesta de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
  { name:"Camila Morán", initials:"CM", color:"#854F0B", bg:"#FAEEDA",
    objectives:[
      {text:"Ejecutar la actualización diaria del 100% de los sistemas de control operativo de Paralegal Procesal.", weight:30},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:50, meta:"Meta: 100%"},
      {text:"Ejecutar 2 propuestas de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
  { name:"Jemima Gonzáles", initials:"JG", color:"#534AB7", bg:"#EEEDFE",
    objectives:[
      {text:"Ejecutar la actualización diaria del 100% de los sistemas de control operativo de Paralegal Procesal.", weight:30},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:50, meta:"Meta: 100%"},
      {text:"Ejecutar 2 propuestas de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
  { name:"Jose Gutiérrez", initials:"JG", color:"#993556", bg:"#FBEAF0",
    objectives:[
      {text:"Ejecutar la actualización diaria del 100% de los sistemas de control operativo de Paralegal Procesal.", weight:30},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:50, meta:"Meta: 100%"},
      {text:"Ejecutar 2 propuestas de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
  { name:"Néstor Rossell", initials:"NR", color:"#5F5E5A", bg:"#F1EFE8",
    objectives:[
      {text:"Ejecutar la actualización diaria del 100% de los sistemas de control operativo de Paralegal Procesal.", weight:30},
      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.", weight:50, meta:"Meta: 100%"},
      {text:"Ejecutar 2 propuestas de mejora para la eficiencia o calidad de operaciones paralegales.", weight:20},
    ]},
];

const STATUSES = [
  {key:"pendiente", label:"Pendiente", color:"#888780", bg:"#F1EFE8"},
  {key:"en_progreso", label:"En progreso", color:"#185FA5", bg:"#E6F1FB"},
  {key:"completado", label:"Completado", color:"#0F6E56", bg:"#E1F5EE"},
];

const STORAGE_KEY = "cid-objetivos-v2";
let selected = 0;
let data = {};
let saveTimer = null;

function defaultState() {
  const d = {};
  MEMBERS.forEach(m => {
    d[m.name] = {obj0:{status:"pendiente",progress:0,notes:""},obj1:{status:"pendiente",progress:0,notes:""},obj2:{status:"pendiente",progress:0,notes:""}};
  });
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return defaultState();
}

function saveData() {
  document.getElementById("savedIndicator").textContent = "Guardando...";
  document.getElementById("savedIndicator").style.color = "#9e9e9b";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    document.getElementById("savedIndicator").textContent = "✓ Guardado";
    document.getElementById("savedIndicator").style.color = "#0F6E56";
  }, 400);
}

function calcWeighted(member, mState) {
  return member.objectives.reduce((acc, obj, i) => {
    const s = mState["obj"+i];
    const p = s.status === "completado" ? 100 : s.progress;
    return acc + (p * obj.weight) / 100;
  }, 0);
}

function nextStatus(cur) {
  const i = STATUSES.findIndex(s => s.key === cur);
  return STATUSES[(i+1)%STATUSES.length].key;
}

function statusLabel(key) {
  return {pendiente:"Pendiente",en_progreso:"En progreso",completado:"Completado"}[key];
}

function ring(pct, color, size) {
  const r = (size-6)/2, circ = 2*Math.PI*r, dash = (pct/100)*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .4s"/>
  </svg>`;
}

function renderStats() {
  const teamAvg = Math.round(MEMBERS.reduce((acc,m)=>acc+calcWeighted(m,data[m.name]),0)/MEMBERS.length);
  const completed = MEMBERS.reduce((acc,m)=>acc+Object.values(data[m.name]).filter(o=>o.status==="completado").length,0);
  document.getElementById("statsGrid").innerHTML = [
    {label:"Avance del equipo", value:teamAvg+"%", color:"#185FA5"},
    {label:"Objetivos completados", value:completed+"/18", color:"#0F6E56"},
    {label:"Asistentes", value:"6", color:"#534AB7"},
    {label:"Cierre", value:"Dic.", color:"#854F0B"},
  ].map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.color}">${s.value}</div><div class="stat-lbl">${s.label}</div></div>`).join("");
}

function renderTeamBar() {
  const bar = document.getElementById("teamBar");
  const labels = document.getElementById("teamBarLabels");
  bar.innerHTML = MEMBERS.map((m,i)=>{
    const pct = calcWeighted(m,data[m.name]);
    const op = pct>0 ? 0.7+(pct/100)*0.3 : 0.15;
    return `<div class="team-bar-seg" style="background:${m.color};opacity:${op}" title="${m.name}: ${Math.round(pct)}%" onclick="selectMember(${i})"></div>`;
  }).join("");
  labels.innerHTML = MEMBERS.map(m=>`<span style="flex:1;text-align:center">${m.initials}</span>`).join("");
}

function renderSidebar() {
  document.getElementById("memberList").innerHTML = MEMBERS.map((m,i)=>{
    const ms = data[m.name];
    const pct = Math.round(calcWeighted(m,ms));
    const comp = Object.values(ms).filter(o=>o.status==="completado").length;
    const isActive = i===selected;
    return `<div class="member-card${isActive?" active":""}" style="background:${isActive?m.bg:"var(--bg)"};border-color:${isActive?m.color+"88":"var(--border)"}" onclick="selectMember(${i})">
      <div class="avatar" style="background:${m.bg};color:${m.color};border-color:${m.color}44">${m.initials}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-sub">${comp}/3 completados</div>
      </div>
      <div class="ring-wrap">
        ${ring(pct,m.color,38)}
        <span class="ring-label" style="color:${m.color}">${pct}%</span>
      </div>
    </div>`;
  }).join("");
}

function renderDetail() {
  const m = MEMBERS[selected];
  const ms = data[m.name];
  const wp = Math.round(calcWeighted(m,ms));

  const objCards = m.objectives.map((obj,i)=>{
    const s = ms["obj"+i];
    const eff = s.status==="completado"?100:s.progress;
    const st = STATUSES.find(x=>x.key===s.status);
    const sliderHtml = s.status!=="completado" ? `
      <div class="progress-label-row"><span>Avance</span><span class="val" id="lbl-${selected}-${i}" style="color:${m.color}">${s.progress}%</span></div>
      <input type="range" min="0" max="100" step="5" value="${s.progress}" style="accent-color:${m.color}" oninput="updateProgress(${i},this.value)">
    ` : "";
    return `<div class="obj-card">
      <div class="obj-top">
        <div class="obj-num" style="background:${m.color}18;color:${m.color}">${i+1}</div>
        <div class="obj-text">${obj.text}${obj.meta?`<div><span class="obj-meta-tag" style="background:${m.color}18;color:${m.color}">${obj.meta}</span></div>`:""}</div>
        <div class="obj-weight"><div class="wlbl">Peso</div><div class="wnum" style="color:${m.color}">${obj.weight}%</div></div>
      </div>
      <div class="status-row">
        <button class="status-btn" style="background:${st.bg};color:${st.color};border-color:${st.color}44" onclick="cycleStatus(${i})">${st.label}</button>
        <span class="hint">clic para cambiar</span>
      </div>
      ${sliderHtml}
      <div class="progress-bar"><div class="progress-fill" id="fill-${selected}-${i}" style="width:${eff}%;background:${m.color}"></div></div>
      <textarea rows="2" placeholder="Agregar comentario u observación..." onchange="updateNotes(${i},this.value)">${s.notes||""}</textarea>
    </div>`;
  }).join("");

  document.getElementById("detailPanel").innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar" style="background:${m.bg};color:${m.color};border-color:${m.color}66">${m.initials}</div>
      <div>
        <div class="detail-name">${m.name}</div>
        <div class="detail-sub">Asistente CID · Avance ponderado: ${wp}%</div>
      </div>
    </div>
    ${objCards}
    <div class="detail-footer">Los cambios se guardan automáticamente.</div>
  `;
}

function render() {
  renderStats();
  renderTeamBar();
  renderSidebar();
  renderDetail();
}

function selectMember(i) {
  selected = i;
  render();
}

function cycleStatus(objIdx) {
  const key = "obj"+objIdx;
  data[MEMBERS[selected].name][key].status = nextStatus(data[MEMBERS[selected].name][key].status);
  saveData();
  render();
}

function updateProgress(objIdx, val) {
  data[MEMBERS[selected].name]["obj"+objIdx].progress = parseInt(val);
  const fill = document.getElementById(`fill-${selected}-${objIdx}`);
  if (fill) fill.style.width = val+"%";
  const lbl = document.getElementById(`lbl-${selected}-${objIdx}`);
  if (lbl) lbl.textContent = val+"%";
  saveData();
  renderStats();
  renderTeamBar();
  renderSidebar();
}

function updateNotes(objIdx, val) {
  data[MEMBERS[selected].name]["obj"+objIdx].notes = val;
  saveData();
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  const fecha = new Date().toLocaleDateString("es-PE");
  const rows = [
    ["VINATEA & TOYAMA — CID"],
    ["Seguimiento de Objetivos — Diciembre 2025"],
    ["Exportado: "+fecha],
    [],
    ["Asistente","Objetivo","Peso (%)","Estado","Avance (%)","Avance ponderado (%)","Observaciones"],
  ];
  let sum = 0;
  MEMBERS.forEach(m=>{
    const ms = data[m.name];
    const wp = Math.round(calcWeighted(m,ms));
    sum += wp;
    m.objectives.forEach((obj,i)=>{
      const s = ms["obj"+i];
      const eff = s.status==="completado"?100:s.progress;
      rows.push([i===0?m.name:"", obj.text, obj.weight, statusLabel(s.status), eff, i===0?wp:"", s.notes||""]);
    });
    rows.push([]);
  });
  rows.push(["Promedio del equipo","","","","",Math.round(sum/MEMBERS.length)+"%",""]);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:22},{wch:52},{wch:10},{wch:14},{wch:12},{wch:22},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws,"Resumen");
  MEMBERS.forEach(m=>{
    const ms = data[m.name];
    const irows=[[m.name.toUpperCase()],[`Avance: ${Math.round(calcWeighted(m,ms))}%`],[],["#","Objetivo","Peso","Estado","Avance (%)","Observaciones"]];
    m.objectives.forEach((obj,i)=>{
      const s=ms["obj"+i];
      irows.push([i+1,obj.text,obj.weight+"%",statusLabel(s.status),s.status==="completado"?100:s.progress,s.notes||""]);
    });
    const iws=XLSX.utils.aoa_to_sheet(irows);
    iws["!cols"]=[{wch:4},{wch:52},{wch:8},{wch:14},{wch:12},{wch:40}];
    XLSX.utils.book_append_sheet(wb,iws,m.name.split(" ")[0]);
  });
  XLSX.writeFile(wb,`Objetivos_CID_${new Date().toISOString().slice(0,10)}.xlsx`);
}

data = loadData();
render();
</script>
</body>
</html>
