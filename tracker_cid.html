const MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CHECKPOINT_MONTH=8; // Agosto
const START_MONTH=1;      // Enero
const END_MONTH=12;       // Diciembre

function getAutoProgress(){
  const now=new Date();
  const m=now.getMonth()+1; // 1-12
  const d=now.getDate();
  // Progreso parcial dentro del mes actual (días transcurridos / 30)
  const partial=d/30;
  const totalMonths=END_MONTH-START_MONTH; // 11
  const elapsed=(m-START_MONTH)+partial;
  return Math.min(Math.round((elapsed/totalMonths)*100),100);
}

function renderMonthBar(pct, color, status){
  const now=new Date();
  const curMonth=now.getMonth()+1;
  const totalMonths=END_MONTH-START_MONTH; // 11 intervalos para 12 meses
  const checkpointPct=((CHECKPOINT_MONTH-START_MONTH)/totalMonths)*100;

  const isCPPast=curMonth>CHECKPOINT_MONTH;
  const isCPCurrent=curMonth===CHECKPOINT_MONTH;
  const feedStatus=isCPPast||isCPCurrent?"✓ Corte pasado":"⚑ Feed Agosto";
  const feedColor=isCPPast?"#0F6E56":isCPCurrent?"#E6223D":"#E6223D";

  const ticksHtml=MONTHS.map((name,i)=>{
    const m=i+1;
    let cls="month-tick";
    if(m===curMonth)cls+=" current";
    else if(m===CHECKPOINT_MONTH)cls+=" checkpoint";
    else if(m<curMonth)cls+=" past";
    return`<span class="${cls}" style="${m===curMonth?"color:"+color:""}">${name}</span>`;
  }).join("");

  const cursorLeft=Math.min(pct,100);

  return`<div class="month-bar-wrap">
    <div class="month-info-row">
      <span class="mi-label">Avance mensual automático</span>
      <span class="mi-val" style="color:${color}">${pct}%
        <span class="feed-badge" style="background:${feedColor}18;color:${feedColor}">${feedStatus}</span>
      </span>
    </div>
    <div class="month-bar-track">
      <div class="month-bar-fill" style="width:${Math.min(pct,checkpointPct)}%;background:${color};opacity:.4"></div>
      <div class="month-bar-fill" style="position:absolute;top:0;left:0;width:${pct}%;background:${color}"></div>
      <div class="month-bar-checkpoint" style="left:${checkpointPct}%">
        <span class="month-bar-checkpoint-lbl">Ago</span>
      </div>
      ${status==="en_progreso"?`<div class="month-bar-cursor" style="left:${cursorLeft}%;background:${color}"></div>`:""}
    </div>
    <div class="month-ticks">${ticksHtml}</div>
  </div>`;
}

      {text:"Implementar y garantizar la actualización semanal del 100% de los sistemas de control operativo de Paralegal Inspecciones, Paralegal Consultoría y de Procuraduría.",weight:40,date:"Julio"},

      {text:"Ejecutar 2 propuestas de mejora de impacto para la eficiencia o calidad de las operaciones paralegales y/o legales.",weight:20,date:"Diciembre"},

      {text:"No exceder las incidencias contingentes / quejas a máximo 1 por trimestre.",weight:35,date:"Diciembre",meta:"Meta: 100%"},
      {text:"Obtener un puntaje mínimo de 4.0% en el grado de satisfacción en la encuesta interna de calidad.",weight:10,date:"Diciembre"},
      {text:"Ejecutar el 100% del proyecto de Centralización de Asuntos / Propuestas de Honorarios.",weight:15,date:"Junio"},

const STATUSES=[
  {key:"pendiente",label:"Pendiente",color:"#888780",bg:"#F1EFE8"},
  {key:"en_progreso",label:"En progreso",color:"#185FA5",bg:"#E6F1FB"},
  {key:"completado",label:"Completado",color:"#0F6E56",bg:"#E1F5EE"},
];
const STORAGE_KEY="cid-full-v2";
const SUP_PASS="CID2025";
let selArea=0,selMember=0,data={},saveTimer=null,supUnlocked=false;

function defObj(){return{status:"pendiente",progress:0,notes:"",attachments:[]}}
function defMember(m){const d={};m.objectives.forEach((_,i)=>d["obj"+i]=defObj());return d}
function defData(){const d={};AREAS.forEach(a=>a.members.forEach(m=>d[mkKey(a,m)]=defMember(m)));return d}
function mkKey(a,m){return a.key+"::"+m.name}

function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}return defData()}
function saveData(){
  setSaved(false);clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch{}setSaved(true)},400);
}
function setSaved(ok){const el=document.getElementById("si");el.textContent=ok?"✓ Guardado":"Guardando...";el.style.color=ok?"#0F6E56":"#9e9e9b"}

function calcW(m,ms){
  return m.objectives.reduce((acc,obj,i)=>{
    const s=ms["obj"+i]||defObj();
    let p=0;
    if(s.status==="completado")p=100;
    else if(s.status==="en_progreso")p=getAutoProgress();
    else p=0;
    return acc+(p*obj.weight)/100;
  },0);
}
function nextStatus(cur){const i=STATUSES.findIndex(s=>s.key===cur);return STATUSES[(i+1)%STATUSES.length].key}
function slbl(k){return{pendiente:"Pendiente",en_progreso:"En progreso",completado:"Completado"}[k]}

function ring(pct,color,size){
  const r=(size-6)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .4s"/></svg>`
}

function areaStats(a){
  let totalObjs=0,completedObjs=0,sumPct=0;
  a.members.forEach(m=>{
    const ms=data[mkKey(a,m)]||defMember(m);
    sumPct+=calcW(m,ms);
    m.objectives.forEach((_,i)=>{totalObjs++;if((ms["obj"+i]||defObj()).status==="completado")completedObjs++;});
  });
  return{totalMembers:a.members.length,totalObjs,completedObjs,avg:Math.round(sumPct/a.members.length)};
}

function renderStats(){
  const a=AREAS[selArea];
  const{totalMembers,totalObjs,completedObjs,avg}=areaStats(a);
  document.getElementById("statsGrid").innerHTML=[
    {label:"Avance del área",value:avg+"%",color:a.color,big:true},
    {label:"Obj. completados",value:completedObjs+"/"+totalObjs,color:"#0F6E56",big:true},
    {label:"Colaboradores",value:totalMembers,color:"#534AB7",big:true},
    {label:"Supervisor",value:a.supervisor,color:"#7A4400",big:false},
  ].map(s=>`<div class="sc" style="border-left-color:${s.color}44"><div class="sc-n" style="color:${s.color};font-size:${s.big?"22px":"14px"}">${s.value}</div><div class="sc-l">${s.label}</div></div>`).join("");
}

function renderAreaTabs(){
  document.getElementById("areaTabs").innerHTML=AREAS.map((a,i)=>{
    const{avg}=areaStats(a);
    const isActive=i===selArea;
    const isLocked=a.locked&&!supUnlocked;
    return`<div class="area-tab${isActive?" active":""}" style="background:${isActive?a.color:"var(--bg)"};color:${isActive?"#fff":a.color};border-color:${a.color}44" onclick="selectArea(${i})">
      ${isLocked?"🔒 ":""}${a.label}
      <span class="area-badge" style="background:${isActive?"rgba(255,255,255,.25)":a.bg};color:${isActive?"#fff":a.color}">${isLocked?"?":avg+"%"}</span>
    </div>`;
  }).join("");
}

function renderTeamBar(){
  const a=AREAS[selArea];
  document.getElementById("tbar").innerHTML=a.members.map((m,i)=>{
    const pct=calcW(m,data[mkKey(a,m)]||defMember(m));
    return`<div class="tbar-seg" style="background:${m.color};opacity:${pct>0?0.65+(pct/100)*0.35:0.15}" title="${m.name}: ${Math.round(pct)}%" onclick="selectMember(${i})"></div>`;
  }).join("");
  document.getElementById("tbarLbls").innerHTML=a.members.map(m=>`<span style="flex:1;text-align:center">${m.initials}</span>`).join("");
}

function renderSidebar(){
  const a=AREAS[selArea];
  document.getElementById("sidebarLbl").textContent="Supervisor: "+a.supervisor;
  document.getElementById("mlist").innerHTML=a.members.map((m,i)=>{
    const ms=data[mkKey(a,m)]||defMember(m);
    const pct=Math.round(calcW(m,ms));
    const comp=m.objectives.filter((_,j)=>(ms["obj"+j]||defObj()).status==="completado").length;
    const isAct=i===selMember;
    return`<div class="mc${isAct?" active":""}" style="background:${isAct?m.bg:"var(--bg)"};border-color:${isAct?m.color+"88":"var(--border)"}" onclick="selectMember(${i})">
      <div class="av" style="background:${m.bg};color:${m.color};border-color:${m.color}44">${m.initials}</div>
      <div class="mc-info"><div class="mc-name">${m.name}</div><div class="mc-sub">${m.role} · ${comp}/${m.objectives.length} obj.</div></div>
      <div class="ring-wrap">${ring(pct,m.color,36)}<span class="ring-lbl" style="color:${m.color}">${pct}%</span></div>
    </div>`;
  }).join("");
}

function renderDetail(){
  const a=AREAS[selArea],m=a.members[selMember];
  const ms=data[mkKey(a,m)]||defMember(m);
  const wp=Math.round(calcW(m,ms));
  const cards=m.objectives.map((obj,i)=>{
    const s=ms["obj"+i]||defObj();
    const eff=s.status==="completado"?100:s.progress;
    const st=STATUSES.find(x=>x.key===s.status);
    const atts=s.attachments||[];
    const attachHtml=atts.length
      ?'<div class="attach-list">'+atts.map((att,ai)=>`<div class="attach-item">
          <div class="attach-icon" style="background:${m.color}15">${getFileIcon(att.type)}</div>
          <div class="attach-info"><div class="attach-name">${att.name}</div><div class="attach-size">${fmtSize(att.size)} · ${att.date}</div></div>
          <div class="attach-actions"><button class="attach-view" onclick="viewAttach(${i},${ai})">Ver</button><button class="attach-del" onclick="removeAttach(${i},${ai})">✕</button></div>
        </div>`).join('')+'</div>'
      :'<p style="font-size:11px;color:var(--text3);margin-top:6px">Sin evidencias adjuntas.</p>';
    return`<div class="oc">
      <div class="oc-top">
        <div class="oc-num" style="background:${m.color}18;color:${m.color}">${i+1}</div>
        <div class="oc-txt">${obj.text}${obj.meta?`<div><span class="oc-meta" style="background:${m.color}18;color:${m.color}">${obj.meta}</span></div>`:""}</div>
        <div class="oc-w"><div class="oc-wl">Peso</div><div class="oc-wn" style="color:${m.color}">${obj.weight}%</div><div class="oc-wdate">${obj.date}</div></div>
      </div>
      <div class="st-row">
        <button class="st-btn" style="background:${st.bg};color:${st.color};border-color:${st.color}44" onclick="cycleStatus(${i})">${st.label}</button>
        <span class="hint">clic para cambiar</span>
      </div>
      ${(()=>{
        if(s.status==="completado"){
          return`<div class="pbar"><div class="pfill" style="width:100%;background:${m.color}"></div></div>`;
        } else if(s.status==="en_progreso"){
          const autoPct=getAutoProgress();
          return renderMonthBar(autoPct,m.color,"en_progreso");
        } else {
          return`<div class="pbar"><div class="pfill" style="width:0%;background:${m.color}"></div></div>`;
        }
      })()}
      <textarea rows="2" placeholder="Agregar comentario u observación..." oninput="updNotes(${i},this.value)">${s.notes||""}</textarea>
      <div class="attach-section">
        <input class="attach-input" id="file-inp-${i}" type="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.eml,.msg,.docx,.doc,.xlsx,.xls,.pptx,.ppt,.txt,.zip" onchange="handleAttach(${i},this)">
        <button class="attach-btn" onclick="document.getElementById('file-inp-${i}').click()">📎 Adjuntar evidencia</button>
        ${attachHtml}
      </div>
    </div>`;
  }).join("");
  document.getElementById("detail").innerHTML=`
    <div class="det-hdr">
      <div class="det-av" style="background:${m.bg};color:${m.color};border-color:${m.color}66">${m.initials}</div>
      <div><div class="det-name">${m.name}</div><div class="det-sub">${m.role} · ${a.label} · Avance ponderado: ${wp}%</div></div>
    </div>${cards}
    <div class="det-foot">Los cambios se guardan automáticamente.</div>`;
}

function render(){renderStats();renderAreaTabs();renderTeamBar();renderSidebar();renderDetail()}

function selectArea(i){
  if(AREAS[i].locked&&!supUnlocked){
    document.getElementById("passModal").style.display="flex";
    document.getElementById("passInput").value="";
    document.getElementById("passErr").textContent="";
    setTimeout(()=>document.getElementById("passInput").focus(),100);
    window._pendingArea=i;return;
  }
  selArea=i;selMember=0;render();
}
function checkPass(){
  if(document.getElementById("passInput").value===SUP_PASS){
    supUnlocked=true;closeModal();selArea=window._pendingArea;selMember=0;render();
  } else {
    document.getElementById("passErr").textContent="Contraseña incorrecta. Intenta de nuevo.";
    document.getElementById("passInput").value="";document.getElementById("passInput").focus();
  }
}
function closeModal(){document.getElementById("passModal").style.display="none"}
function selectMember(i){selMember=i;renderSidebar();renderDetail();renderTeamBar()}

function cycleStatus(objIdx){
  const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
  if(!data[key])data[key]=defMember(m);
  if(!data[key]["obj"+objIdx])data[key]["obj"+objIdx]=defObj();
  data[key]["obj"+objIdx].status=nextStatus(data[key]["obj"+objIdx].status);
  saveData();render();
}
function updProg(objIdx,val){ /* auto-progress, no manual slider */
  const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
  if(!data[key])data[key]=defMember(m);
  if(!data[key]["obj"+objIdx])data[key]["obj"+objIdx]=defObj();
  data[key]["obj"+objIdx].progress=parseInt(val);
  const fill=document.getElementById(`fill-${selArea}-${selMember}-${objIdx}`);if(fill)fill.style.width=val+"%";
  const lbl=document.getElementById(`lbl-${selArea}-${selMember}-${objIdx}`);if(lbl)lbl.textContent=val+"%";
  saveData();renderStats();renderAreaTabs();renderTeamBar();renderSidebar();
}
function updNotes(objIdx,val){
  const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
  if(!data[key])data[key]=defMember(m);
  if(!data[key]["obj"+objIdx])data[key]["obj"+objIdx]=defObj();
  data[key]["obj"+objIdx].notes=val;saveData();
}


const MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CHECKPOINT_MONTH=8; // Agosto
const START_MONTH=1;      // Enero
const END_MONTH=12;       // Diciembre

function getAutoProgress(){
  const now=new Date();
  const m=now.getMonth()+1; // 1-12
  const d=now.getDate();
  // Progreso parcial dentro del mes actual (días transcurridos / 30)
  const partial=d/30;
  const totalMonths=END_MONTH-START_MONTH; // 11
  const elapsed=(m-START_MONTH)+partial;
  return Math.min(Math.round((elapsed/totalMonths)*100),100);
}

function renderMonthBar(pct, color, status){
  const now=new Date();
  const curMonth=now.getMonth()+1;
  const totalMonths=END_MONTH-START_MONTH; // 11 intervalos para 12 meses
  const checkpointPct=((CHECKPOINT_MONTH-START_MONTH)/totalMonths)*100;

  const isCPPast=curMonth>CHECKPOINT_MONTH;
  const isCPCurrent=curMonth===CHECKPOINT_MONTH;
  const feedStatus=isCPPast||isCPCurrent?"✓ Corte pasado":"⚑ Feed Agosto";
  const feedColor=isCPPast?"#0F6E56":isCPCurrent?"#E6223D":"#E6223D";

  const ticksHtml=MONTHS.map((name,i)=>{
    const m=i+1;
    let cls="month-tick";
    if(m===curMonth)cls+=" current";
    else if(m===CHECKPOINT_MONTH)cls+=" checkpoint";
    else if(m<curMonth)cls+=" past";
    return`<span class="${cls}" style="${m===curMonth?"color:"+color:""}">${name}</span>`;
  }).join("");

  const cursorLeft=Math.min(pct,100);

  return`<div class="month-bar-wrap">
    <div class="month-info-row">
      <span class="mi-label">Avance mensual automático</span>
      <span class="mi-val" style="color:${color}">${pct}%
        <span class="feed-badge" style="background:${feedColor}18;color:${feedColor}">${feedStatus}</span>
      </span>
    </div>
    <div class="month-bar-track">
      <div class="month-bar-fill" style="width:${Math.min(pct,checkpointPct)}%;background:${color};opacity:.4"></div>
      <div class="month-bar-fill" style="position:absolute;top:0;left:0;width:${pct}%;background:${color}"></div>
      <div class="month-bar-checkpoint" style="left:${checkpointPct}%">
        <span class="month-bar-checkpoint-lbl">Ago</span>
      </div>
      ${status==="en_progreso"?`<div class="month-bar-cursor" style="left:${cursorLeft}%;background:${color}"></div>`:""}
    </div>
    <div class="month-ticks">${ticksHtml}</div>
  </div>`;
}

/* Adjuntos */
function getFileIcon(t){
  if(t.includes("pdf"))return"📄";if(t.includes("image"))return"🖼️";
  if(t.includes("word")||t.includes("docx"))return"📝";
  if(t.includes("excel")||t.includes("sheet"))return"📊";
  if(t.includes("presentation")||t.includes("powerpoint"))return"📊";
  if(t.includes("text"))return"📋";if(t.includes("zip"))return"🗜️";return"📎";
}
function fmtSize(b){if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB"}
function handleAttach(objIdx,input){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024){alert("El archivo supera 3MB. Por favor adjunta una versión más ligera.");input.value="";return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
    if(!data[key])data[key]=defMember(m);
    if(!data[key]["obj"+objIdx])data[key]["obj"+objIdx]=defObj();
    if(!data[key]["obj"+objIdx].attachments)data[key]["obj"+objIdx].attachments=[];
    data[key]["obj"+objIdx].attachments.push({name:file.name,type:file.type,size:file.size,data:e.target.result,date:new Date().toLocaleDateString("es-PE")});
    input.value="";saveData();renderDetail();
  };reader.readAsDataURL(file);
}
function removeAttach(objIdx,ai){
  const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
  data[key]["obj"+objIdx].attachments.splice(ai,1);saveData();renderDetail();
}
function viewAttach(objIdx,ai){
  const a=AREAS[selArea],m=a.members[selMember],key=mkKey(a,m);
  const att=data[key]["obj"+objIdx].attachments[ai];
  const win=window.open();
  if(att.type.includes("image")){win.document.write(`<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${att.data}" style="max-width:100%;max-height:100vh;object-fit:contain"></body></html>`);}
  else{const a2=win.document.createElement("a");a2.href=att.data;a2.download=att.name;win.document.body.appendChild(a2);a2.click();win.close();}
}

/* Excel export */
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const fecha=new Date().toLocaleDateString("es-PE");
  const rows=[["VINATEA & TOYAMA — CID"],["Seguimiento de Objetivos — 2025"],["Exportado: "+fecha],[],
    ["Área","Supervisor","Nombre","Cargo","Objetivo","Peso (%)","Fecha","Estado","Avance (%)","Av. Ponderado (%)","Observaciones","Evidencias"]];
  AREAS.forEach(a=>{
    a.members.forEach(m=>{
      const ms=data[mkKey(a,m)]||defMember(m);
      const wp=Math.round(calcW(m,ms));
      m.objectives.forEach((obj,i)=>{
        const s=ms["obj"+i]||defObj();
        const eff=s.status==="completado"?100:s.progress;
        const atts=(s.attachments||[]).map(x=>x.name).join(", ");
        rows.push([i===0?a.label:"",i===0?a.supervisor:"",i===0?m.name:"",i===0?m.role:"",obj.text,obj.weight,obj.date,slbl(s.status),eff,i===0?wp:"",s.notes||"",atts]);
      });rows.push([]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:22},{wch:16},{wch:20},{wch:10},{wch:55},{wch:8},{wch:9},{wch:14},{wch:10},{wch:18},{wch:35},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,"Resumen");
  AREAS.forEach(a=>{
    const arows=[[a.label.toUpperCase()+" — "+a.supervisor],["Exportado: "+fecha],[],
      ["Nombre","Cargo","Objetivo","Peso","Fecha","Estado","Avance (%)","Observaciones","Evidencias"]];
    a.members.forEach(m=>{
      const ms=data[mkKey(a,m)]||defMember(m);
      m.objectives.forEach((obj,i)=>{
        const s=ms["obj"+i]||defObj();
        const atts=(s.attachments||[]).map(x=>x.name).join(", ");
        arows.push([i===0?m.name:"",i===0?m.role:"",obj.text,obj.weight+"%",obj.date,slbl(s.status),s.status==="completado"?100:s.progress,s.notes||"",atts]);
      });arows.push([]);
    });
    const aws=XLSX.utils.aoa_to_sheet(arows);
    aws["!cols"]=[{wch:20},{wch:10},{wch:55},{wch:8},{wch:9},{wch:14},{wch:10},{wch:35},{wch:30}];
    XLSX.utils.book_append_sheet(wb,aws,a.label.substring(0,20));
  });
  XLSX.writeFile(wb,`Objetivos_CID_${new Date().toISOString().slice(0,10)}.xlsx`);
}

data=loadData();
AREAS.forEach(a=>a.members.forEach(m=>{
  const k=mkKey(a,m);
  if(!data[k])data[k]=defMember(m);
  m.objectives.forEach((_,i)=>{if(!data[k]["obj"+i])data[k]["obj"+i]=defObj();if(!data[k]["obj"+i].attachments)data[k]["obj"+i].attachments=[];});
}));
render();
</script>
